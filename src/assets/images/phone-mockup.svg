<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 620" fill="none">
  <defs>
    <linearGradient id="phoneBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1518"/>
      <stop offset="100%" stop-color="#0d0a0b"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0d10"/>
      <stop offset="100%" stop-color="#0d0a0b"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c0203a"/>
      <stop offset="100%" stop-color="#7a1225"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c0203a"/>
      <stop offset="100%" stop-color="#e8956d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-10%" width="140%" height="120%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#c0203a" flood-opacity="0.3"/>
    </filter>
    <clipPath id="phoneClip">
      <rect x="20" y="20" width="280" height="580" rx="44" ry="44"/>
    </clipPath>
  </defs>

  <!-- Phone outer shell -->
  <rect x="10" y="10" width="300" height="600" rx="50" ry="50" fill="url(#phoneBg)" filter="url(#shadow)"/>
  <!-- Phone border gradient -->
  <rect x="10" y="10" width="300" height="600" rx="50" ry="50" fill="none" stroke="url(#primary)" stroke-width="1.5" opacity="0.5"/>

  <!-- Screen area -->
  <rect x="20" y="20" width="280" height="580" rx="44" ry="44" fill="url(#screen)" clip-path="url(#phoneClip)"/>

  <!-- Notch -->
  <rect x="110" y="26" width="100" height="22" rx="11" fill="#0d0a0b"/>
  <circle cx="160" cy="37" r="4" fill="#1c1518"/>

  <!-- Status bar -->
  <text x="35" y="58" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.5)">9:41</text>
  <rect x="255" y="50" width="32" height="14" rx="4" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
  <rect x="257" y="52" width="22" height="10" rx="2.5" fill="#22c55e"/>

  <!-- App header bar -->
  <rect x="20" y="70" width="280" height="50" fill="rgba(192,32,58,0.15)" clip-path="url(#phoneClip)"/>
  <rect x="20" y="118" width="280" height="1" fill="rgba(255,255,255,0.06)"/>
  <!-- Logo in header -->
  <circle cx="52" cy="95" r="13" fill="url(#primary)"/>
  <text x="52" y="100" text-anchor="middle" font-family="Georgia,serif" font-size="12" font-weight="700" fill="white">S</text>
  <text x="72" y="91" font-family="Georgia,serif" font-size="13" font-weight="700" fill="#F5F0EB">Safe</text>
  <text x="104" y="91" font-family="Georgia,serif" font-size="13" font-weight="700" fill="#c0203a">Her</text>
  <!-- Notification bell -->
  <circle cx="275" cy="95" r="13" fill="rgba(255,255,255,0.06)"/>
  <text x="275" y="100" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.6)">🔔</text>

  <!-- Map section background -->
  <rect x="20" y="119" width="280" height="180" fill="#111" clip-path="url(#phoneClip)"/>
  <!-- Map grid lines -->
  <line x1="20" y1="150" x2="300" y2="150" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="20" y1="180" x2="300" y2="180" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="20" y1="210" x2="300" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="20" y1="240" x2="300" y2="240" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="20" y1="270" x2="300" y2="270" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="80" y1="119" x2="80" y2="299" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="140" y1="119" x2="140" y2="299" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="200" y1="119" x2="200" y2="299" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="260" y1="119" x2="260" y2="299" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <!-- Roads -->
  <line x1="20" y1="200" x2="300" y2="200" stroke="rgba(255,255,255,0.10)" stroke-width="3"/>
  <line x1="160" y1="119" x2="160" y2="299" stroke="rgba(255,255,255,0.10)" stroke-width="3"/>
  <!-- Incident heatmap blobs -->
  <circle cx="120" cy="175" r="28" fill="rgba(192,32,58,0.20)"/>
  <circle cx="120" cy="175" r="15" fill="rgba(192,32,58,0.35)"/>
  <circle cx="120" cy="175" r="7"  fill="rgba(192,32,58,0.70)"/>
  <circle cx="220" cy="240" r="18" fill="rgba(239,68,68,0.18)"/>
  <circle cx="220" cy="240" r="9"  fill="rgba(239,68,68,0.45)"/>
  <!-- Safe zone -->
  <circle cx="240" cy="155" r="16" fill="rgba(34,197,94,0.15)" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3"/>
  <circle cx="240" cy="155" r="6"  fill="#22c55e" opacity="0.8"/>
  <!-- User pin -->
  <circle cx="160" cy="200" r="7" fill="#c0203a" stroke="white" stroke-width="2"/>
  <circle cx="160" cy="200" r="14" fill="rgba(192,32,58,0.2)"/>
  <!-- Map label -->
  <rect x="30" y="125" width="80" height="20" rx="6" fill="rgba(192,32,58,0.7)"/>
  <text x="70" y="138" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="600" fill="white">● LIVE MAP</text>

  <!-- Bottom card section -->
  <rect x="20" y="299" width="280" height="301" fill="#0f0c0d" clip-path="url(#phoneClip)"/>

  <!-- Recent Incidents title -->
  <text x="35" y="325" font-family="Georgia,serif" font-size="13" font-weight="700" fill="#F5F0EB">Recent Reports</text>
  <rect x="230" y="313" width="60" height="18" rx="6" fill="rgba(192,32,58,0.2)" stroke="rgba(192,32,58,0.4)" stroke-width="1"/>
  <text x="260" y="325" text-anchor="middle" font-family="system-ui" font-size="9" fill="#c0203a">View All</text>

  <!-- Report card 1 -->
  <rect x="30" y="336" width="260" height="58" rx="12" fill="#1c1518" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="42" y="348" width="8" height="8" rx="4" fill="#f97316"/>
  <text x="56" y="356" font-family="system-ui" font-size="10" font-weight="600" fill="#F5F0EB">Street Harassment</text>
  <rect x="170" y="344" width="54" height="15" rx="5" fill="rgba(34,197,94,0.15)"/>
  <text x="197" y="354" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">Verified</text>
  <text x="56" y="369" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.35)">2 min ago · 0.3km away</text>

  <!-- Report card 2 -->
  <rect x="30" y="402" width="260" height="58" rx="12" fill="#1c1518" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="42" y="414" width="8" height="8" rx="4" fill="#a855f7"/>
  <text x="56" y="422" font-family="system-ui" font-size="10" font-weight="600" fill="#F5F0EB">Suspicious Following</text>
  <rect x="170" y="410" width="54" height="15" rx="5" fill="rgba(234,179,8,0.15)"/>
  <text x="197" y="420" text-anchor="middle" font-family="system-ui" font-size="8" fill="#eab308">Pending</text>
  <text x="56" y="435" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.35)">15 min ago · 0.8km away</text>

  <!-- SOS Button -->
  <rect x="30" y="470" width="260" height="52" rx="16" fill="url(#primary)"/>
  <text x="160" y="502" text-anchor="middle" font-family="Georgia,serif" font-size="16" font-weight="700" fill="white">🆘 Emergency SOS</text>

  <!-- Bottom nav bar -->
  <rect x="20" y="540" width="280" height="60" fill="#141011" clip-path="url(#phoneClip)"/>
  <rect x="20" y="540" width="280" height="1" fill="rgba(255,255,255,0.06)"/>
  <!-- Nav icons -->
  <text x="60"  y="570" text-anchor="middle" font-size="16">🏠</text>
  <text x="113" y="570" text-anchor="middle" font-size="16">🗺️</text>
  <text x="160" y="570" text-anchor="middle" font-size="16">📋</text>
  <text x="207" y="570" text-anchor="middle" font-size="16">📊</text>
  <text x="253" y="570" text-anchor="middle" font-size="16">👤</text>
  <!-- Active indicator -->
  <rect x="42" y="582" width="36" height="3" rx="1.5" fill="url(#primary)"/>

  <!-- Home button bar -->
  <rect x="120" y="592" width="80" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
</svg>
